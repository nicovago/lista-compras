<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#ff7a59">
  <title>Prueba de acceso</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css?v=11">
  <link rel="stylesheet" href="theme-v2.css?v=11">
</head>
<body>
  <section id="authGate" class="auth-gate">
    <div class="auth-card">
      <span class="auth-mark" aria-hidden="true">🛒</span>
      <p class="eyebrow">Prueba de conexión</p>
      <h1>Ingreso con Google</h1>
      <p>En esta etapa verificaremos únicamente que Firebase Authentication reconozca tu cuenta.</p>
      <button id="loginBtn" class="google-btn" type="button">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M21.6 12.2c0-.7-.1-1.4-.2-2H12v3.8h5.4a4.6 4.6 0 0 1-2 3v2.5h3.2c1.9-1.7 3-4.3 3-7.3Z"/><path fill="#34A853" d="M12 22c2.7 0 5-.9 6.6-2.5L15.4 17c-.9.6-2 1-3.4 1-2.6 0-4.8-1.8-5.6-4.1H3.1v2.6A10 10 0 0 0 12 22Z"/><path fill="#FBBC05" d="M6.4 13.9A6 6 0 0 1 6.1 12c0-.7.1-1.3.3-1.9V7.5H3.1A10 10 0 0 0 2 12c0 1.6.4 3.1 1.1 4.5l3.3-2.6Z"/><path fill="#EA4335" d="M12 6c1.5 0 2.8.5 3.8 1.5l2.9-2.8A9.7 9.7 0 0 0 12 2a10 10 0 0 0-8.9 5.5l3.3 2.6A6 6 0 0 1 12 6Z"/></svg>
        Continuar con Google
      </button>
      <p id="authMessage" class="auth-message"></p>
    </div>
  </section>

  <main id="successView" class="auth-gate hidden">
    <div class="auth-card">
      <span class="auth-mark success-mark" aria-hidden="true">✓</span>
      <p class="eyebrow">Autenticación correcta</p>
      <h1 id="userName">Cuenta conectada</h1>
      <p id="userEmail"></p>
      <button id="logoutBtn" class="google-btn" type="button">Cerrar sesión</button>
    </div>
  </main>

  <script type="module" src="app.js?v=11"></script>
</body>
</html>
