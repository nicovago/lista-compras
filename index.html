<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#1976d2">
  <title>Lista de Compras</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Lista familiar</p>
        <h1>🛒 Lista de Compras</h1>
      </div>
      <span id="syncStatus" class="status">Guardado local</span>
    </header>

    <section class="card composer" aria-labelledby="formTitle">
      <h2 id="formTitle">Agregar producto</h2>
      <div class="form-grid">
        <label>Producto<input id="itemName" autocomplete="off" placeholder="Ej.: Leche"></label>
        <label>Cantidad<input id="itemQty" autocomplete="off" placeholder="Ej.: 2"></label>
        <label>Rubro<select id="itemCat"></select></label>
      </div>
      <label>Nota<textarea id="itemNote" placeholder="Marca, presentación, corte, etc."></textarea></label>
      <div class="actions">
        <button id="cancelEditBtn" class="secondary hidden" type="button">Cancelar edición</button>
        <button id="addBtn" class="primary" type="button">Agregar</button>
      </div>
    </section>

    <section class="card toolbar">
      <div class="filter-wrap">
        <input id="filter" placeholder="Buscar producto, nota o rubro…">
        <button id="filterClear" class="icon-btn hidden" aria-label="Borrar filtro">×</button>
      </div>
      <div id="quickCats" class="chips"></div>
      <div class="toolbar-actions">
        <button id="shareBtn">Compartir</button>
        <button id="exportBtn">Exportar</button>
        <button id="importBtn">Importar</button>
        <button id="clearDone" class="danger">Borrar comprados</button>
        <input type="file" id="importFile" accept="application/json" hidden>
      </div>
    </section>

    <section id="listContainer" aria-live="polite"></section>
    <p id="stats" class="stats"></p>
  </main>

  <script src="app.js" defer></script>
</body>
</html>
